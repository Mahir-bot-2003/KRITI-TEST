<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kriti AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-2: #1a1a1a;
            --border: #222222;
            --border-light: #2a2a2a;
            --text-primary: #e8e8e8;
            --text-secondary: #777777;
            --text-muted: #444444;
            --accent: #e8e8e8;
            --accent-dim: rgba(232, 232, 232, 0.06);
            --red: #cc3333;
            --green: #33aa55;
            --yellow: #aa8833;
            --radius: 6px;
        }

        html {
            font-size: 16px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- NAV --- */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            height: 64px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
        }

        .nav-brand {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        .nav-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--text-secondary);
            transition: color 0.4s ease;
        }

        .nav-status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-muted);
            transition: background 0.4s ease;
        }

        .nav-status.is-connected .nav-status-dot { background: var(--green); }
        .nav-status.is-connected { color: var(--green); }
        .nav-status.is-connecting .nav-status-dot { background: var(--yellow); animation: blink 1s infinite; }
        .nav-status.is-connecting { color: var(--yellow); }
        .nav-status.is-error .nav-status-dot { background: var(--red); }
        .nav-status.is-error { color: var(--red); }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* --- MAIN LAYOUT --- */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin-top: 64px;
            height: calc(100vh - 64px);
            overflow: hidden;
        }

        /* --- LEFT PANEL --- */
        .panel-left {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding: 80px 64px;
            border-right: 1px solid var(--border);
        }

        .headline {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(32px, 4vw, 56px);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 1.1;
            color: var(--text-primary);
            margin-bottom: 24px;
        }

        .headline span {
            color: var(--text-muted);
        }

        .description {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            max-width: 400px;
            margin-bottom: 48px;
        }

        .connect-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        .input-group {
            position: relative;
        }

        .input-group label {
            display: block;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-field {
            width: 100%;
            padding: 14px 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--text-muted);
        }

        .input-field::placeholder {
            color: var(--text-muted);
        }

        .btn-connect {
            margin-top: 4px;
            padding: 14px 24px;
            background: var(--text-primary);
            color: var(--bg);
            border: none;
            border-radius: var(--radius);
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.15s ease;
        }

        .btn-connect:hover {
            opacity: 0.85;
        }

        .btn-connect:active {
            transform: scale(0.98);
        }

        .btn-connect:disabled {
            opacity: 0.2;
            cursor: not-allowed;
            transform: none;
        }

        /* --- RIGHT PANEL --- */
        .panel-right {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow: hidden;
        }

        /* --- MIC SECTION --- */
        .mic-section {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .mic-btn {
            position: relative;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .mic-btn:hover:not(:disabled) {
            border-color: var(--text-secondary);
            color: var(--text-primary);
        }

        .mic-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        .mic-btn.active {
            background: var(--text-primary);
            border-color: var(--text-primary);
            color: var(--bg);
        }

        .mic-btn.active::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(232, 232, 232, 0.15);
            animation: mic-ring 2s ease-in-out infinite;
        }

        @keyframes mic-ring {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.08); opacity: 0; }
        }

        .mic-icon {
            width: 20px;
            height: 20px;
        }

        .mic-label {
            position: absolute;
            bottom: -28px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .mic-btn.active .mic-label {
            color: var(--text-secondary);
        }

        /* --- TRANSCRIPT --- */
        .transcript-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .transcript-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .transcript-title {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-muted);
        }

        .transcript-body {
            flex: 1;
            overflow-y: auto;
            padding: 24px 32px;
            scroll-behavior: smooth;
        }

        .transcript-body::-webkit-scrollbar {
            width: 4px;
        }

        .transcript-body::-webkit-scrollbar-track {
            background: transparent;
        }

        .transcript-body::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .transcript-empty {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-size: 13px;
            color: var(--text-muted);
        }

        .msg {
            margin-bottom: 16px;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.6;
            animation: msg-in 0.3s ease;
        }

        @keyframes msg-in {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-label {
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .msg.user {
            background: var(--surface-2);
            border: 1px solid var(--border);
            margin-left: 48px;
        }
        .msg.user .msg-label { color: var(--text-muted); }
        .msg.user .msg-text { color: var(--text-primary); }

        .msg.agent {
            background: var(--surface);
            border: 1px solid var(--border-light);
            margin-right: 48px;
        }
        .msg.agent .msg-label { color: var(--text-muted); }
        .msg.agent .msg-text { color: var(--text-secondary); }

        .msg.system {
            background: transparent;
            border: none;
            text-align: center;
            padding: 8px 16px;
            margin-left: 0;
            margin-right: 0;
        }
        .msg.system .msg-label { display: none; }
        .msg.system .msg-text {
            color: var(--text-muted);
            font-size: 12px;
        }

        /* --- CONSOLE LOG --- */
        .console-section {
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            max-height: 140px;
            overflow-y: auto;
            padding: 12px 32px;
            background: var(--surface);
        }

        .console-section::-webkit-scrollbar {
            width: 4px;
        }

        .console-section::-webkit-scrollbar-track {
            background: transparent;
        }

        .console-section::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .console-entry {
            font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 11px;
            line-height: 1.8;
            color: var(--text-muted);
        }

        .console-entry.log-info { color: var(--text-secondary); }
        .console-entry.log-error { color: var(--red); }
        .console-entry.log-warn { color: var(--yellow); }

        .console-entry .ts {
            color: var(--text-muted);
            margin-right: 8px;
        }

        /* --- RESPONSIVE --- */
        @media (max-width: 900px) {
            nav { padding: 0 24px; }

            main {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr;
                overflow-y: auto;
            }

            .panel-left {
                padding: 48px 24px;
                border-right: none;
                border-bottom: 1px solid var(--border);
            }

            .panel-right {
                height: auto;
                min-height: 60vh;
            }

            .headline {
                font-size: 28px;
            }

            .connect-form {
                max-width: 100%;
            }

            .transcript-body {
                padding: 16px;
            }

            .console-section {
                padding: 12px 16px;
            }

            .msg.user { margin-left: 24px; }
            .msg.agent { margin-right: 24px; }
        }
    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <div class="nav-brand">Voice Assistant</div>
        <div class="nav-status" id="status">
            <div class="nav-status-dot"></div>
            <span>Disconnected</span>
        </div>
    </nav>

    <main>
        <!-- LEFT -->
        <div class="panel-left">
            <h1 class="headline">Talk to<br>Kriti AI<span>.</span></h1>
            <p class="description">
                Connect to a room and use your microphone to have a real-time voice conversation. The transcript will appear on the right.
            </p>
            <div class="connect-form">
                <div class="input-group">
                    <label for="roomName">Room</label>
                    <input
                        type="text"
                        id="roomName"
                        class="input-field"
                        placeholder="e.g. my-test-room"
                        value="test-room"
                    />
                </div>
                <button id="connectBtn" class="btn-connect" onclick="connect()">Connect</button>
            </div>
        </div>

        <!-- RIGHT -->
        <div class="panel-right">
            <!-- MIC -->
            <div class="mic-section">
                <button id="micBtn" class="mic-btn" onclick="toggleMicrophone()" disabled>
                    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="9" y="1" width="6" height="12" rx="3"></rect>
                        <path d="M19 10v1a7 7 0 0 1-14 0v-1"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    <span class="mic-label" id="micLabel">Mic off</span>
                </button>
            </div>

            <!-- TRANSCRIPT -->
            <div class="transcript-section">
                <div class="transcript-header">
                    <span class="transcript-title">Transcript</span>
                </div>
                <div class="transcript-body" id="transcript">
                    <div class="transcript-empty">Waiting for connection&hellip;</div>
                </div>
            </div>

            <!-- CONSOLE -->
            <div class="console-section" id="consoleLog">
                <div class="console-entry log-info"><span class="ts">--:--:--</span>Ready</div>
            </div>
        </div>
    </main>

    <!-- LiveKit Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>

    <script>
        let room = null;
        let isMicEnabled = false;

        function logToConsole(message, type = 'info') {
            const consoleLog = document.getElementById('consoleLog');
            const timestamp = new Date().toLocaleTimeString();
            const logEntry = document.createElement('div');
            logEntry.className = `console-entry log-${type}`;
            logEntry.innerHTML = `<span class="ts">${timestamp}</span>${message}`;
            consoleLog.appendChild(logEntry);
            consoleLog.scrollTop = consoleLog.scrollHeight;
            console.log(message);
        }

        function setStatus(state, text) {
            const status = document.getElementById('status');
            status.className = 'nav-status';
            if (state === 'connected') status.classList.add('is-connected');
            else if (state === 'connecting') status.classList.add('is-connecting');
            else if (state === 'error') status.classList.add('is-error');
            status.querySelector('span').textContent = text;
        }

        window.addEventListener('load', () => {
            if (typeof LivekitClient === 'undefined') {
                logToConsole('LiveKit library failed to load. Retrying...', 'warn');
                const script = document.createElement('script');
                script.src = 'https://unpkg.com/livekit-client@2.5.8/dist/livekit-client.umd.min.js';
                script.onload = () => {
                    logToConsole('LiveKit loaded via fallback', 'info');
                };
                script.onerror = () => {
                    logToConsole('Failed to load LiveKit library', 'error');
                    alert('Failed to load required libraries. Please refresh the page.');
                };
                document.head.appendChild(script);
            } else {
                logToConsole('Enter a room name and click Connect', 'info');
            }
        });

        async function connect() {
            if (typeof LivekitClient === 'undefined') {
                alert('LiveKit library is not loaded yet. Please wait and try again.');
                return;
            }

            const roomName = document.getElementById('roomName').value.trim();
            if (!roomName) {
                alert('Please enter a room name');
                return;
            }

            const connectBtn = document.getElementById('connectBtn');
            const micBtn = document.getElementById('micBtn');

            try {
                logToConsole(`Connecting to room: ${roomName}`, 'info');
                setStatus('connecting', 'Connecting\u2026');
                connectBtn.disabled = true;

                const response = await fetch('/get-token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ roomName })
                });

                if (!response.ok) {
                    throw new Error('Failed to get token from server');
                }

                const data = await response.json();
                logToConsole('Token received from server', 'info');
                logToConsole(`Connecting to: ${data.url}`, 'info');

                room = new LivekitClient.Room({
                    adaptiveStream: true,
                    dynacast: true,
                });

                room.on(LivekitClient.RoomEvent.Connected, () => {
                    logToConsole('Successfully connected to room', 'info');
                });

                room.on(LivekitClient.RoomEvent.ParticipantConnected, (participant) => {
                    logToConsole(`Participant joined: ${participant.identity}`, 'info');
                    if (participant.identity.includes('agent')) {
                        addMessage('System', 'AI Agent has joined the conversation');
                    }
                });

                room.on(LivekitClient.RoomEvent.TrackSubscribed, handleTrackSubscribed);

                room.on(LivekitClient.RoomEvent.TrackUnsubscribed, (track) => {
                    logToConsole('Track unsubscribed', 'warn');
                });

                room.on(LivekitClient.RoomEvent.Disconnected, () => {
                    logToConsole('Disconnected from room', 'warn');
                    setStatus('disconnected', 'Disconnected');
                    connectBtn.disabled = false;
                    micBtn.disabled = true;
                });

                await room.connect(data.url, data.token);

                setStatus('connected', roomName);
                micBtn.disabled = false;

                addMessage('System', 'Connected. Click the microphone to start talking.');
                logToConsole('Ready to communicate', 'info');

            } catch (error) {
                console.error('Connection error:', error);
                logToConsole(`Connection failed: ${error.message}`, 'error');
                setStatus('error', 'Connection failed');
                connectBtn.disabled = false;
                alert('Failed to connect: ' + error.message);
            }
        }

        async function toggleMicrophone() {
            if (!room) return;

            const micBtn = document.getElementById('micBtn');
            const micLabel = document.getElementById('micLabel');

            try {
                if (!isMicEnabled) {
                    await room.localParticipant.setMicrophoneEnabled(true);
                    micBtn.classList.add('active');
                    micLabel.textContent = 'Listening';
                    isMicEnabled = true;
                    logToConsole('Microphone enabled', 'info');
                    addMessage('System', 'Microphone is on — speak now');
                } else {
                    await room.localParticipant.setMicrophoneEnabled(false);
                    micBtn.classList.remove('active');
                    micLabel.textContent = 'Mic off';
                    isMicEnabled = false;
                    logToConsole('Microphone disabled', 'warn');
                    addMessage('System', 'Microphone is off');
                }
            } catch (error) {
                logToConsole(`Microphone error: ${error.message}`, 'error');
                alert('Failed to toggle microphone. Please check browser permissions.');
            }
        }

        function handleTrackSubscribed(track, publication, participant) {
            logToConsole(`Track subscribed: ${track.kind} from ${participant.identity}`, 'info');

            if (track.kind === 'audio') {
                const audioElement = track.attach();
                audioElement.autoplay = true;
                document.body.appendChild(audioElement);
                logToConsole('Audio track attached and playing', 'info');

                if (participant.identity.includes('agent')) {
                    addMessage('Agent', 'Agent is speaking...');
                }
            }
        }

        function addMessage(speaker, text) {
            const transcript = document.getElementById('transcript');

            const emptyEl = transcript.querySelector('.transcript-empty');
            if (emptyEl) emptyEl.remove();

            const messageDiv = document.createElement('div');
            let msgClass = 'msg';

            if (speaker === 'You') {
                msgClass += ' user';
            } else if (speaker === 'System') {
                msgClass += ' system';
            } else {
                msgClass += ' agent';
            }

            messageDiv.className = msgClass;
            messageDiv.innerHTML = `
                <div class="msg-label">${speaker}</div>
                <div class="msg-text">${text}</div>
            `;

            transcript.appendChild(messageDiv);
            transcript.scrollTop = transcript.scrollHeight;
        }
    </script>
</body>
</html>
